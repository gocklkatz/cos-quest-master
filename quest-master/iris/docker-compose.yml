services:
  iris:
    image: containers.intersystems.com/intersystems/iris-community:2025.1
    container_name: my-iris
    ports:
      - "1972:1972"   # SuperServer (Studio, VS Code extension)
      - "52773:52773" # Web Gateway (REST, Management Portal)
    environment:
      - ISC_DATA_DIRECTORY=/dur/iconfig
    volumes:
      - ./iris-data:/dur/iconfig
    healthcheck:
      test: ["CMD", "iris", "stat", "IRIS"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
