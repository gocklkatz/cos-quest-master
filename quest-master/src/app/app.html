<div class="app-shell">
  <app-header-bar (openSettings)="openSettings()" />

  <div class="workspace">
    <!-- Left: quest panel placeholder (populated in Step 3) -->
    <aside class="quest-sidebar">
      <div class="quest-placeholder">
        <div class="quest-placeholder-icon">📜</div>
        <p class="quest-placeholder-title">Quest Panel</p>
        <p class="quest-placeholder-sub">Quests will appear here in the next step.</p>
        <p class="quest-placeholder-sub">For now, write any ObjectScript in the editor and run it on IRIS.</p>
      </div>
    </aside>

    <!-- Right: editor + output -->
    <section class="editor-area">
      <div class="editor-pane">
        <app-code-editor [(code)]="editorCode" (runRequested)="runCode()" />
      </div>

      <div class="run-toolbar">
        <button
          class="run-btn"
          (click)="runCode()"
          [disabled]="isRunning()"
        >
          @if (isRunning()) {
            <span class="spinner">⟳</span> Running…
          } @else {
            ▶ Run on IRIS
          }
        </button>
        <span class="run-hint">Ctrl+Enter</span>
      </div>

      <div class="output-pane">
        <app-output-panel
          [output]="output()"
          [error]="error()"
          [isRunning]="isRunning()"
        />
      </div>
    </section>
  </div>

  @if (showSettings()) {
    <app-settings-modal (closed)="closeSettings()" />
  }
</div>
