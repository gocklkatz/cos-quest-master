<div class="app-shell">
  <app-header-bar (openSettings)="openSettings()" />

  @if (!hasApiKey()) {
    <div class="ai-disabled-banner">
      <span class="ai-banner-icon">&#128274;</span>
      AI features disabled. Add your Anthropic API key in
      <button class="ai-banner-link" (click)="openSettings()">Settings</button>
      to unlock quest generation and AI code review.
    </div>
  }

  <div class="workspace">
    <!-- Left: quest panel -->
    <aside class="quest-sidebar">
      <app-quest-panel
        [quest]="questEngine.currentQuest()"
        [availableQuests]="questEngine.availableQuests()"
        [allQuests]="questEngine.allQuests()"
        [completedQuestIds]="questEngine.completedQuestIds()"
        [evaluation]="evaluation()"
        [isEvaluating]="isEvaluating()"
        (questSelected)="onQuestSelected($event)"
      />
    </aside>

    <!-- Right: editor + output -->
    <section class="editor-area">
      <div class="editor-pane">
        <app-code-editor [(code)]="editorCode" (runRequested)="runCode()" />
      </div>

      <div class="run-toolbar">
        <button
          class="run-btn"
          (click)="runCode()"
          [disabled]="isRunning()"
        >
          @if (isRunning()) {
            <span class="spinner">&#8635;</span> Running&hellip;
          } @else {
            &#9654; Run on IRIS
          }
        </button>

        <button
          class="submit-btn"
          (click)="submitCode()"
          [disabled]="isRunning() || isEvaluating() || !questEngine.currentQuest() || questEngine.currentQuestCompleted()"
          [title]="questEngine.currentQuestCompleted() ? 'Quest already completed' : 'Submit your solution'"
        >
          @if (questEngine.currentQuestCompleted()) {
            &#10003; Completed
          } @else if (isEvaluating()) {
            <span class="spinner">&#8635;</span> Evaluating&hellip;
          } @else {
            &#128228; Submit
          }
        </button>

        <span class="run-hint">Ctrl+Enter to run</span>
      </div>

      <div class="output-pane">
        <app-output-panel
          [output]="output()"
          [error]="error()"
          [isRunning]="isRunning()"
        />
      </div>
    </section>
  </div>

  @if (showSettings()) {
    <app-settings-modal (closed)="closeSettings()" />
  }

  <app-xp-animation
    [trigger]="xpAnimTrigger()"
    [xpEarned]="xpAnimAmount()"
    [leveledUp]="xpAnimLeveledUp()"
    [newLevel]="xpAnimNewLevel()"
  />
</div>
