<div class="app-shell">
  <app-header-bar (openSettings)="openSettings()" />

  @if (!hasApiKey()) {
    <div class="ai-disabled-banner">
      <span class="ai-banner-icon">&#128274;</span>
      AI features disabled. Add your Anthropic API key in
      <button class="ai-banner-link" (click)="openSettings()">Settings</button>
      to unlock quest generation and AI code review.
    </div>
  }

  <div class="workspace">
    <!-- Left: quest panel / glossary -->
    <aside class="quest-sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab" [class.active]="sidebarTab() === 'quest'" (click)="sidebarTab.set('quest')">Quest</button>
        <button class="sidebar-tab" [class.active]="sidebarTab() === 'glossary'" (click)="sidebarTab.set('glossary')">Glossary</button>
      </div>

      @if (sidebarTab() === 'quest') {
        <app-quest-panel
          [quest]="questEngine.currentQuest()"
          [availableQuests]="questEngine.availableQuests()"
          [allQuests]="questEngine.allQuests()"
          [completedQuestIds]="questEngine.completedQuestIds()"
          [evaluation]="evaluation()"
          [isEvaluating]="isEvaluating()"
          (questSelected)="onQuestSelected($event)"
          (conceptClicked)="onConceptClicked($event)"
        />
      } @else {
        <app-glossary
          [activeQuest]="questEngine.currentQuest()"
          [highlightTerm]="glossaryHighlight()"
          (copyToEditor)="onCopyToEditor($event)"
        />
      }
    </aside>

    <!-- Right: editor + output -->
    <section class="editor-area">
      <div class="editor-pane">
        <app-code-editor
          [(code)]="editorCode"
          [files]="questFiles()"
          [activeFileId]="activeFileId()"
          [challengeMode]="challengeMode()"
          (runRequested)="runCode()"
          (fileSelected)="onFileSelected($event)"
          (toggleChallengeMode)="onToggleChallengeMode()"
          (restoreStarterCode)="onRestoreStarterCode()"
        />
      </div>

      <div class="run-toolbar">
        <button
          class="run-btn"
          (click)="runCode()"
          [disabled]="isRunning()"
        >
          @if (isRunning()) {
            <span class="spinner">&#8635;</span> Running&hellip;
          } @else {
            &#9654; Run on IRIS
          }
        </button>

        <button
          class="submit-btn"
          (click)="submitCode()"
          [disabled]="isRunning() || isEvaluating() || !questEngine.currentQuest() || questEngine.currentQuestCompleted()"
          [title]="questEngine.currentQuestCompleted() ? 'Quest already completed' : 'Submit your solution'"
        >
          @if (questEngine.currentQuestCompleted()) {
            &#10003; Completed
          } @else if (isEvaluating()) {
            <span class="spinner">&#8635;</span> Evaluating&hellip;
          } @else {
            &#128228; Submit
          }
        </button>

        <span class="run-hint">Ctrl+Enter to run</span>

        <button
          class="chat-toggle-btn"
          [class.active]="showChat()"
          (click)="toggleChat()"
          title="Toggle AI Pair Programmer"
        >&#128172; Pair</button>
      </div>

      <div class="output-pane">
        <app-output-panel
          [output]="output()"
          [error]="error()"
          [isRunning]="isRunning()"
          [compileErrors]="compileErrors()"
        />
      </div>

      @if (showChat()) {
        <div class="chat-pane">
          <app-ai-pair-chat
            [quest]="questEngine.currentQuest()"
            [currentCode]="editorCode()"
            [lastOutput]="output() ?? error() ?? ''"
            [apiKey]="anthropicApiKey()"
          />
        </div>
      }
    </section>
  </div>

  @if (showSettings()) {
    <app-settings-modal (closed)="closeSettings()" />
  }

  <app-xp-animation
    [trigger]="xpAnimTrigger()"
    [xpEarned]="xpAnimAmount()"
    [leveledUp]="xpAnimLeveledUp()"
    [newLevel]="xpAnimNewLevel()"
  />
</div>
