@if (!hasApiKey()) {
  <div class="ai-disabled-banner">
    <span class="ai-banner-icon">&#128274;</span>
    AI features disabled. Add your Anthropic API key in
    <button class="ai-banner-link" (click)="uiEvents.requestSettings()">Settings</button>
    to unlock quest generation and AI code review.
  </div>
}

<div class="workspace">
  <!-- Left: quest panel -->
  <aside class="quest-sidebar" [style.width.px]="sidebarWidth()">
    <app-quest-panel
      [quest]="questEngine.currentQuest()"
      [availableQuests]="questEngine.availableQuests()"
      [completedQuestIds]="questEngine.completedQuestIds()"
      [evaluation]="evaluation()"
      [isEvaluating]="isEvaluating()"
      (questSelected)="onQuestSelected($event)"
      (hintRevealed)="onHintRevealed()"
      (predictionSubmitted)="onPredictionSubmitted($event)"
    />
  </aside>

  <!-- Sidebar ↔ content vertical divider -->
  <div class="resize-divider resize-divider--vertical"
       appResizableDivider
       orientation="vertical"
       [currentSize]="sidebarWidth()"
       [minSize]="180"
       [maxSize]="600"
       (sizeChange)="onSidebarResize($event)">
    <span class="resize-divider__glyph">&#8942;</span>
  </div>

  <!-- Right: editor + output -->
  <section class="editor-area">
    <div class="editor-pane">
      <app-code-editor
        [code]="editorCode()" (codeChange)="editorCode.set($event)"
        [files]="questFiles()"
        [activeFileId]="activeFileId()"
        [challengeMode]="challengeMode()"
        [readOnly]="isPredictionQuest()"
        (runRequested)="runCode()"
        (fileSelected)="onFileSelected($event)"
        (toggleChallengeMode)="onToggleChallengeMode()"
        (restoreStarterCode)="onRestoreStarterCode()"
      />
    </div>

    <div class="run-toolbar">
      @if (!isPredictionQuest()) {
        <button
          class="run-btn"
          (click)="runCode()"
          [disabled]="isRunning() || questEngine.questGenerating()"
        >
          @if (isRunning()) {
            <span class="spinner">&#8635;</span> Running&hellip;
          } @else {
            &#9654; Run on IRIS
          }
        </button>

        <button
          class="submit-btn"
          (click)="submitCode()"
          [disabled]="isRunning() || isEvaluating() || questEngine.questGenerating() || !questEngine.currentQuest() || questEngine.currentQuestCompleted()"
          [title]="questEngine.currentQuestCompleted() ? 'Quest already completed' : 'Submit your solution'"
        >
          @if (questEngine.currentQuestCompleted()) {
            &#10003; Completed
          } @else if (isEvaluating()) {
            <span class="spinner">&#8635;</span> Evaluating&hellip;
          } @else {
            &#128228; Submit
          }
        </button>

        <span class="run-hint">Ctrl+Enter to run</span>
      }

      <button
        class="chat-toggle-btn"
        [class.active]="showChat()"
        (click)="toggleChat()"
        title="Toggle AI Pair Programmer"
      >&#128172; Pair</button>
    </div>

    <!-- Editor ↔ output horizontal divider -->
    <div class="resize-divider resize-divider--horizontal"
         appResizableDivider
         orientation="horizontal"
         [invertDelta]="true"
         [currentSize]="outputHeight()"
         [minSize]="80"
         [maxSize]="600"
         (sizeChange)="onOutputResize($event)">
      <span class="resize-divider__glyph">&#8943;</span>
    </div>

    <div class="output-pane" [style.height.px]="outputHeight()">
      <app-output-panel
        [output]="output()"
        [error]="error()"
        [isRunning]="isRunning()"
        [compileErrors]="compileErrors()"
      />
    </div>

    @if (evaluationWarning()) {
      <div class="evaluation-warning">⚠ {{ evaluationWarning() }}</div>
    }

    @if (showChat()) {
      <!-- Output ↔ chat horizontal divider -->
      <div class="resize-divider resize-divider--horizontal"
           appResizableDivider
           orientation="horizontal"
           [invertDelta]="true"
           [currentSize]="chatHeight()"
           [minSize]="60"
           [maxSize]="500"
           (sizeChange)="onChatResize($event)">
        <span class="resize-divider__glyph">&#8943;</span>
      </div>

      <div class="chat-pane" [style.height.px]="chatHeight()">
        <app-ai-pair-chat
          [quest]="questEngine.currentQuest()"
          [currentCode]="editorCode()"
          [lastOutput]="output() ?? error() ?? ''"
          [apiKey]="anthropicApiKey()"
        />
      </div>
    }
  </section>
</div>

@if (reviewEvaluation()) {
  <app-review-modal [evaluation]="reviewEvaluation()!" [apiKey]="anthropicApiKey()" (confirmed)="onReviewConfirmed()" />
}

<app-xp-animation
  [trigger]="xpAnimTrigger()"
  [xpEarned]="xpAnimAmount()"
  [leveledUp]="xpAnimLeveledUp()"
  [newLevel]="xpAnimNewLevel()"
/>

<app-achievement-overlay
  [trigger]="achievementAnimTrigger()"
  [achievement]="achievementAnimItem()"
/>

<app-victory-overlay
  [trigger]="victoryTrigger()"
  [playerName]="gameState.playerName()"
  [level]="victoryLevel()"
  [xp]="victoryXp()"
/>
