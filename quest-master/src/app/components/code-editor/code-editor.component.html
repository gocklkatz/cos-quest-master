<div class="editor-toolbar">
  <div class="file-tabs">
    @for (file of files(); track file.id) {
      <button
        class="file-tab"
        [class.active]="file.id === activeFileId()"
        (click)="selectFile(file.id)"
        [title]="file.filename"
      >{{ file.label }}</button>
    }
  </div>

  <div class="toolbar-right">
    <button
      class="toolbar-btn"
      [class.active]="challengeMode()"
      (click)="toggleChallengeMode.emit()"
      title="Challenge Mode — start quests with an empty editor"
    >&#9876; Challenge</button>
    @if (challengeMode() && activeFile()?.starterCode) {
      <button
        class="toolbar-btn toolbar-btn--ghost"
        (click)="restoreStarterCode.emit()"
        title="Show the starter code for this file"
      >Show starter code</button>
    }
  </div>
</div>

<ngx-monaco-editor
  class="monaco-host"
  [options]="editorOptions"
  (onInit)="onEditorInit($event)"
/>
