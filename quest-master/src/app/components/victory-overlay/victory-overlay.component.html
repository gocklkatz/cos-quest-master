<canvas #fireworks class="fireworks-canvas" aria-hidden="true"></canvas>

@if (visible()) {
  <div class="victory-backdrop" role="dialog" aria-modal="true" aria-label="Victory">
    <div class="victory-card">
      <div class="victory-stars">★ ★ ★</div>
      <h1 class="victory-title">You Won!</h1>
      <p class="victory-subtitle">The Eternal Archive is sealed.<br>Your mastery is complete.</p>

      <div class="victory-stats">
        <div class="stat-row">
          <span class="stat-label">Rank</span>
          <span class="stat-value rank">{{ rank }}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Level</span>
          <span class="stat-value">{{ level() }}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Total XP</span>
          <span class="stat-value">{{ xp() | number }}</span>
        </div>
      </div>

      <button class="victory-btn" (click)="onDismiss()" autofocus>
        Continue
      </button>
    </div>
  </div>
}
