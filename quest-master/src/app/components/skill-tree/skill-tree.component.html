<div class="skill-tree-wrapper">

  <!-- ── Header / toggle ──────────────────────────────── -->
  <button class="tree-toggle" (click)="toggleExpanded()" [attr.aria-expanded]="expanded()">
    <span class="tree-toggle-label">Skill Tree</span>
    <span class="tree-toggle-arrow" [class.expanded]="expanded()">&#9662;</span>
  </button>

  @if (expanded()) {
    <div class="skill-tree">

      <!-- ── Row 1: Quest Zero ─────────────────────────── -->
      <div class="tree-row tree-row--center">
        @for (b of row1(); track b.id) {
          <button
            class="branch-node"
            [class]="'status-' + b.status + ' tier-' + b.tier"
            [class.selected]="b.id === selectedBranchId()"
            (click)="selectBranch(b)"
            [disabled]="b.status === 'locked'"
            [title]="b.description"
          >
            <span class="node-status-icon">{{ statusIcon(b.status) }}</span>
            <span class="node-label">{{ b.label }}</span>
            @if (b.questCount > 0) {
              <span class="node-progress">{{ b.completedCount }}/{{ b.questCount }}</span>
            }
          </button>
        }
      </div>

      <!-- ── Connector: 1 → 3 (fan-out) ───────────────── -->
      <svg class="connector" viewBox="0 0 300 24" preserveAspectRatio="none" aria-hidden="true">
        <line x1="150" y1="0" x2="150" y2="12" stroke="currentColor" stroke-width="1.5"/>
        <line x1="50"  y1="12" x2="250" y2="12" stroke="currentColor" stroke-width="1.5"/>
        <line x1="50"  y1="12" x2="50"  y2="24" stroke="currentColor" stroke-width="1.5"/>
        <line x1="150" y1="12" x2="150" y2="24" stroke="currentColor" stroke-width="1.5"/>
        <line x1="250" y1="12" x2="250" y2="24" stroke="currentColor" stroke-width="1.5"/>
      </svg>

      <!-- ── Row 2: Commands / Globals / Strings ───────── -->
      <div class="tree-row tree-row--3col">
        @for (b of row2(); track b.id) {
          <button
            class="branch-node"
            [class]="'status-' + b.status + ' tier-' + b.tier"
            [class.selected]="b.id === selectedBranchId()"
            (click)="selectBranch(b)"
            [disabled]="b.status === 'locked'"
            [title]="b.description"
          >
            <span class="node-status-icon">{{ statusIcon(b.status) }}</span>
            <span class="node-label">{{ b.label }}</span>
            @if (b.questCount > 0) {
              <span class="node-progress">{{ b.completedCount }}/{{ b.questCount }}</span>
            }
          </button>
        }
      </div>

      <!-- ── Connector: row 2 → row 3 (straight 3-col) ── -->
      <svg class="connector" viewBox="0 0 300 16" preserveAspectRatio="none" aria-hidden="true">
        <line x1="50"  y1="0" x2="50"  y2="16" stroke="currentColor" stroke-width="1.5"/>
        <line x1="150" y1="0" x2="150" y2="16" stroke="currentColor" stroke-width="1.5"/>
        <line x1="250" y1="0" x2="250" y2="16" stroke="currentColor" stroke-width="1.5"/>
      </svg>

      <!-- ── Row 3: Classes / SQL / %JSON & REST ────────── -->
      <div class="tree-row tree-row--3col">
        @for (b of row3(); track b.id) {
          <button
            class="branch-node"
            [class]="'status-' + b.status + ' tier-' + b.tier"
            [class.selected]="b.id === selectedBranchId()"
            (click)="selectBranch(b)"
            [disabled]="b.status === 'locked'"
            [title]="b.description"
          >
            <span class="node-status-icon">{{ statusIcon(b.status) }}</span>
            <span class="node-label">{{ b.label }}</span>
            @if (b.questCount > 0) {
              <span class="node-progress">{{ b.completedCount }}/{{ b.questCount }}</span>
            }
          </button>
        }
      </div>

      <!-- ── Connector: 3 → 1 (fan-in) ────────────────── -->
      <svg class="connector" viewBox="0 0 300 24" preserveAspectRatio="none" aria-hidden="true">
        <line x1="50"  y1="0"  x2="50"  y2="12" stroke="currentColor" stroke-width="1.5"/>
        <line x1="150" y1="0"  x2="150" y2="12" stroke="currentColor" stroke-width="1.5"/>
        <line x1="250" y1="0"  x2="250" y2="12" stroke="currentColor" stroke-width="1.5"/>
        <line x1="50"  y1="12" x2="250" y2="12" stroke="currentColor" stroke-width="1.5"/>
        <line x1="150" y1="12" x2="150" y2="24" stroke="currentColor" stroke-width="1.5"/>
      </svg>

      <!-- ── Row 4: Capstone ───────────────────────────── -->
      <div class="tree-row tree-row--center">
        @for (b of row4(); track b.id) {
          <button
            class="branch-node"
            [class]="'status-' + b.status + ' tier-' + b.tier"
            [class.selected]="b.id === selectedBranchId()"
            (click)="selectBranch(b)"
            [disabled]="b.status === 'locked'"
            [title]="b.description"
          >
            <span class="node-status-icon">{{ statusIcon(b.status) }}</span>
            <span class="node-label">{{ b.label }}</span>
            @if (b.questCount > 0) {
              <span class="node-progress">{{ b.completedCount }}/{{ b.questCount }}</span>
            }
          </button>
        }
      </div>

      <!-- ── Legend ─────────────────────────────────────── -->
      <div class="tree-legend">
        <span class="legend-item status-available">&#9675; Available</span>
        <span class="legend-item status-in-progress">&#9654; In Progress</span>
        <span class="legend-item status-completed">&#10003; Done</span>
        <span class="legend-item status-locked">&#128274; Locked</span>
      </div>

      @if (selectedBranchId()) {
        <div class="branch-filter-notice">
          Showing <strong>{{ selectedBranchId() }}</strong> quests &nbsp;
          <button class="clear-filter-btn" (click)="branchSelected.emit(null)">&#10005; Clear</button>
        </div>
      }

    </div>
  }
</div>
